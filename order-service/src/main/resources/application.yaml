spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://postgres-order:5432/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

jwt:
  secret: heldo-secret-key-heldo-secret-key
  expiration: 86400000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger - %msg%n"
  level:
    org.springframework.kafka: INFO
    org.springframework.web.socket: INFO
    root: INFO
    com.ujjawal.heldo.order_service: INFO

server:
  port: 8080