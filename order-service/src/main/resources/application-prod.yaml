spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

server:
  port: ${PORT:8080}

jwt:
  secret: heldo-gaobazar-jwt-secret-key-2026-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.ujjawal.heldo.order_service: INFO